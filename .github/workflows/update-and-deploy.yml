name: Update weather and deploy RavRadar

on:
  workflow_dispatch:
  schedule:
    # Central opdatering hvert 5. minut. DMI prøves altid først; fallback udgives straks.
    - cron: "*/5 * * * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ravradar-pages
  cancel-in-progress: true

jobs:
  update:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate project
        run: npm run validate
      - name: Update central weather cache
        id: weather
        continue-on-error: true
        timeout-minutes: 7
        run: npm run update:weather
        env:
          DMI_API_KEY: ${{ secrets.DMI_API_KEY }}
          DMI_MAX_RETRIES: 1
          DMI_REQUEST_GAP_MS: 1400
          WEATHER_REQUEST_TIMEOUT_MS: 18000
          WEATHER_USER_AGENT: "RavRadar/2.4 (${{ github.server_url }}/${{ github.repository }})"
      - name: Report provider fallback
        if: steps.weather.outcome != 'success'
        run: echo "Weather updater failed or timed out. Deploying the last valid cached conditions.json."
      - name: Commit changed weather data
        run: |
          if [ ! -f data/live/conditions.json ]; then
            echo "No weather cache exists; continuing with application deployment"
            exit 0
          fi
          if git diff --quiet -- data/live/conditions.json; then
            echo "No weather changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live/conditions.json
          git commit -m "Update central weather conditions"
          git push

  deploy:
    needs: [update]
    if: always() && (needs.update.result == 'success' || needs.update.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
