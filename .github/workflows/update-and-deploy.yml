name: Update weather and deploy RavRadar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ravradar-pages
  cancel-in-progress: false

jobs:
  update:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate project
        run: npm run validate
      - name: Update weather cache
        run: npm run update:dmi
        env:
          DMI_API_KEY: ${{ secrets.DMI_API_KEY }}
      - name: Commit changed weather data
        run: |
          if git diff --quiet -- data/live/conditions.json; then
            echo "No weather changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live/conditions.json
          git commit -m "Update weather conditions"
          git push

  deploy:
    needs: [update]
    if: always() && (needs.update.result == 'success' || needs.update.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
