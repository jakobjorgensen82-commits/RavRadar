name: Update weather and deploy RavRadar

on:
  workflow_dispatch:
  schedule:
    # Central opdatering hvert 5. minut. Brugerne henter kun den udgivne cache.
    - cron: "*/5 * * * *"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ravradar-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate project
        run: npm run validate
      - name: Update central weather cache
        id: weather
        continue-on-error: true
        timeout-minutes: 7
        run: npm run update:weather
        env:
          DMI_API_KEY: ${{ secrets.DMI_API_KEY }}
          DMI_MAX_RETRIES: 1
          DMI_REQUEST_GAP_MS: 1400
          WEATHER_REQUEST_TIMEOUT_MS: 18000
          WEATHER_USER_AGENT: "RavRadar/2.6.0 (${{ github.server_url }}/${{ github.repository }})"
      - name: Validate updated weather cache
        if: steps.weather.outcome == 'success'
        run: npm run validate:data
      - name: Report cached fallback
        if: steps.weather.outcome != 'success'
        run: echo "Weather updater failed or timed out. Deploying the last valid cached conditions.json."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
