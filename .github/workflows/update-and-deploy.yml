name: Update DMI and deploy RavRadar

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore compact DMI history
        uses: actions/cache@v4
        with:
          path: data/live/conditions.json
          key: dmi-${{ github.run_id }}
          restore-keys: |
            dmi-
      - name: Fetch current DMI forecasts
        run: npm run update:dmi
      - name: Validate project and score engine
        run: npm run validate
      - name: Prepare Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
